name: CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Rust indexer: build + test (no C++ toolchain required)
  # ---------------------------------------------------------------------------
  rust-indexer:
    name: Rust indexer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust_indexer/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/rust_indexer/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install flatc (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y flatbuffers-compiler

      - name: Install flatc (macOS)
        if: runner.os == 'macOS'
        run: brew install flatbuffers

      - name: Install flatc (Windows)
        if: runner.os == 'Windows'
        run: choco install flatc --no-progress

      - name: cargo build
        working-directory: src/rust_indexer
        run: cargo build

      - name: cargo test
        working-directory: src/rust_indexer
        run: cargo test -- --nocapture

  # ---------------------------------------------------------------------------
  # C++ build (Linux only for now — mirrors the existing build setup)
  # ---------------------------------------------------------------------------
  cpp-build:
    name: C++ build (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev qt6-base-private-dev \
            libboost-filesystem-dev libboost-program-options-dev \
            flatbuffers-compiler libflatbuffers-dev \
            clang

      - name: Configure (no language packages — fast smoke build)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_CXX_LANGUAGE_PACKAGE=OFF \
            -DBUILD_RUST_LANGUAGE_PACKAGE=OFF \
            -DBUILD_UNIT_TESTS_PACKAGE=OFF

      - name: Build
        run: cmake --build build --parallel

