name: CI

on:
  # Push trigger deactivated to conserve CI budget. Re-enable by uncommenting.
  # push:
  #   branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Rust indexer: build + test (no C++ toolchain required)
  # ---------------------------------------------------------------------------
  rust-indexer:
    name: Rust indexer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # rust-src is required for the macro-expansion tests: without
          # sysroot sources, core is absent from the crate graph and
          # #[derive(...)] does not resolve (expansion degrades gracefully,
          # but the derive tests assert the expanded items).
          components: rust-src

      - name: Cache Cargo registry + build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust_indexer/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/rust_indexer/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install flatc (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # apt's flatbuffers-compiler is too old and generates code incompatible
          # with the flatbuffers crate; use the release build matching the crate.
          curl -fsSL -o /tmp/flatc.zip \
            https://github.com/google/flatbuffers/releases/download/v25.12.19-2026-02-06-03fffb2/Linux.flatc.binary.g++-13.zip
          sudo unzip -o /tmp/flatc.zip -d /usr/local/bin
          flatc --version

      - name: Install flatc (macOS)
        if: runner.os == 'macOS'
        run: brew install flatbuffers

      - name: Install flatc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # choco's flatc is an unmaintained v1.12.0 whose install script fails;
          # fetch the official prebuilt flatc matching the flatbuffers crate.
          $url = "https://github.com/google/flatbuffers/releases/download/v25.12.19-2026-02-06-03fffb2/Windows.flatc.binary.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\flatc.zip"
          Expand-Archive "$env:RUNNER_TEMP\flatc.zip" -DestinationPath "$env:RUNNER_TEMP\flatc"
          "$env:RUNNER_TEMP\flatc" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: cargo build
        working-directory: src/rust_indexer
        run: cargo build

      - name: cargo test
        working-directory: src/rust_indexer
        run: cargo test -- --nocapture

  # ---------------------------------------------------------------------------
  # C++ build + unit tests on Linux / macOS.
  #
  # Builds the full application WITH the C++ language package (libclang) and the
  # Catch2 unit tests, then runs them via ctest. Dependencies come from the vcpkg
  # manifest (stdexec/tomlplusplus/... are find_package()'d unconditionally); Qt6
  # and LLVM/Clang 18-23 (for the C++ indexer) are installed separately.
  #
  # ctest runs each Catch2 case in its own process, which also isolates any single
  # crashing test from the rest of the suite.
  #
  # Windows runs as its own job below: it builds LLVM through vcpkg instead of
  # using a system LLVM, which needs a different caching and environment setup.
  # ---------------------------------------------------------------------------
  cpp-build:
    name: C++ build + tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      # The Rust language package builds the indexer through Corrosion, and
      # the smoke test loads the sysroot at runtime (rust-src, same reason
      # as in the rust-indexer job).
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Cache Cargo registry + build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust_indexer/target
            build/cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/rust_indexer/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Qt 6 (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          cache: true

      - name: Install build tools + LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build lsb-release wget software-properties-common gnupg
          # The C++ indexer uses recent libclang APIs (TextDiagnosticPrinter/
          # DiagnosticsEngine constructors changed); distro clang-18/19 is too old.
          # Install LLVM 22 from apt.llvm.org to match the developed-against version.
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          sudo bash /tmp/llvm.sh 22
          sudo apt-get install -y libclang-22-dev libclang-cpp22-dev llvm-22-dev

      # macOS uses Homebrew for LLVM and Qt: the aqtinstall Qt packages still link
      # '-framework AGL', which recent macOS SDKs no longer ship, while brew's Qt
      # matches the SDK on the runner (and the local dev setup).
      - name: Install build tools + LLVM + Qt (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja llvm qt

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg build artifacts
        uses: actions/cache@v6
        with:
          path: |
            build/vcpkg_installed
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-cxx-${{ hashFiles('vcpkg.json') }}
          restore-keys: ${{ runner.os }}-vcpkg-cxx-

      - name: Configure
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Build with Homebrew LLVM (Apple Clang lacks the C++23/26 features stdexec
            # and the libc++ ABI handling rely on); point find_package at brew LLVM + Qt.
            LLVM_PREFIX="$(brew --prefix llvm)"
            QT_PREFIX="$(brew --prefix qt)"
            EXTRA="-DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=$PWD/cmake-toolchains/llvm-clang-macos.cmake -DCMAKE_PREFIX_PATH=$LLVM_PREFIX;$QT_PREFIX"
          else
            export CC=clang-22 CXX=clang++-22
            EXTRA="-DClang_DIR=/usr/lib/llvm-22/lib/cmake/clang -DLLVM_DIR=/usr/lib/llvm-22/lib/cmake/llvm"
          fi
          # The project triplet carries per-port customizations (e.g. catch2 is
          # built with CATCH_CONFIG_NO_POSIX_SIGNALS, which src/test/Catch2.cpp
          # asserts on Linux); without it vcpkg builds plain ports.
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-arm64-linux-windows-osx-static-md \
            -DBUILD_CXX_LANGUAGE_PACKAGE=ON \
            -DBUILD_RUST_LANGUAGE_PACKAGE=ON \
            -DBUILD_UNIT_TESTS_PACKAGE=ON \
            $EXTRA

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --no-tests=error

      # Headless end-to-end: index the rust_indexer crate through the real
      # app pipeline (CLI -> IPC -> subprocess -> PersistentStorage) and
      # verify the resulting database. The script takes the build dir; the
      # app + indexer binaries land in build/app (copy_rust_indexer).
      - name: Rust smoke (headless end-to-end)
        env:
          QT_QPA_PLATFORM: offscreen
        run: ./scripts/smoke-rust.sh build

  # ---------------------------------------------------------------------------
  # C++ build + unit tests on Windows.
  #
  # Unlike Linux/macOS there is no usable system LLVM here: the llvm.org
  # archives are built with the static CRT (/MT) and cannot link into this /MD
  # build, and installer distributions ship no CMake dev files. LLVM/Clang 22
  # is therefore built from source through vcpkg-overlay-ports/llvm via the
  # "cxx-indexer" manifest feature -- the same path as a local
  # `cmake --preset rel-cxx`.
  #
  # That build takes a few hours on a hosted runner, so the vcpkg binary cache
  # is essential: LLVM builds once into vcpkg's default files backend, which is
  # persisted via actions/cache (~1-2 GB of the 10 GB repo quota, alongside the
  # other caches) and restored on later runs. It rebuilds only when the port,
  # the triplet, or the runner's MSVC change.
  # ---------------------------------------------------------------------------
  cpp-build-windows:
    name: C++ build + tests (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 330 # headroom for a cold vcpkg LLVM build

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          cache: true

      - name: Install build tools
        run: choco install ninja --no-progress

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # vcpkg's x-gha binary-cache backend was REMOVED from vcpkg (setting
      # VCPKG_BINARY_SOURCES to it silently disabled caching altogether and the
      # ~2.6h LLVM build ran on every push). Instead let vcpkg use its default
      # files backend (%LOCALAPPDATA%\vcpkg\archives) and persist that directory
      # through the Actions cache. Save runs even when a later step fails so an
      # expensive LLVM build is never thrown away by a red test run.
      # Note: MSVC updates on the runner image change vcpkg's ABI hash -- those
      # runs legitimately rebuild LLVM once and refresh the cache.
      - name: Restore vcpkg binary cache
        id: vcpkg-binary-cache
        uses: actions/cache/restore@v6
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: windows-vcpkg-bin-${{ hashFiles('vcpkg.json', 'vcpkg-overlay-ports/**', 'vcpkg-triplets/**') }}
          restore-keys: windows-vcpkg-bin-

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Configure
        shell: bash
        run: |
          # Same shape as the Linux/macOS job. The project triplet is required:
          # it injects CATCH_CONFIG_NO_WINDOWS_SEH into the catch2 build, which
          # src/test/Catch2.cpp asserts on Windows. The "cxx-indexer" manifest
          # feature pulls in the LLVM overlay port (see vcpkg.json).
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-arm64-linux-windows-osx-static-md \
            -DVCPKG_MANIFEST_FEATURES=cxx-indexer \
            -DBUILD_CXX_LANGUAGE_PACKAGE=ON \
            -DBUILD_RUST_LANGUAGE_PACKAGE=OFF \
            -DBUILD_UNIT_TESTS_PACKAGE=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-binary-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: ${{ steps.vcpkg-binary-cache.outputs.cache-primary-key }}

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --no-tests=error
