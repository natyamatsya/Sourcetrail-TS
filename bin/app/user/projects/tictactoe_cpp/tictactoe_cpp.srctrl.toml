version = '8'

[[source_groups]]
cpp_standard = 'c++2a'
id = 'afdfade2-4b42-49a6-961a-d4a563f2cf84'
name = 'TicTacToe Source Group'
status = 'enabled'
type = 'C++ Source Group'

    [source_groups.cross_compilation]
    target_options_enabled = '0'

        [source_groups.cross_compilation.target]
        abi = 'unknown'
        arch = 'x86_64'
        sys = 'unknown'
        vendor = 'unknown'

    [source_groups.source_extensions]
    source_extension = [ '.cpp', '.cxx', '.cc', '.c' ]

    [source_groups.source_paths]
    source_path = './src'
