description = 'Test Suites:\n\n [::\tmCODE_AREA_TESTS\ts\tp]\n [::\tmLOCAL_REFERENCE_TESTS\ts\tp]\n [::\tmSNIPPET_LIST_TESTS\ts\tp]\n [::\tmSINGLE_FILE_TESTS\ts\tp]\n [::\tmFILE_BAR_TESTS\ts\tp]\n [::\tmERROR_TESTS\ts\tp]\n [::\tmSYNTAX_HIGHLIGHTER_TESTS\ts\tp]\n'
version = '8'

[[source_groups]]
cpp_standard = 'c++17'
id = '475571d1-b082-4fff-81c5-d099c19f957d'
name = 'C++ Source Group'
status = 'enabled'
type = 'C++ Source Group'

    [source_groups.cross_compilation]
    target_options_enabled = '0'

        [source_groups.cross_compilation.target]
        abi = 'unknown'
        arch = 'x86_64'
        sys = 'unknown'
        vendor = 'unknown'

    [source_groups.exclude_filters]
    exclude_filter = [ 'data/file_bar_files/non_indexed.h', 'data/file_bar_files/non_indexed_and_incomplete.h' ]

    [source_groups.source_extensions]
    source_extension = [ '.cpp', '.cxx', '.cc' ]

    [source_groups.source_paths]
    source_path = 'data'
